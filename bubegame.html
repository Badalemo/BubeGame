<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bube's Game</title>
    <style>
        body { margin: 0; background: #2b2b36; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        #gameCanvas { background: #3a3a48; border: 4px solid #ff69b4; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 400;

        let player = { x: 400, y: 350 };
        let treats = ['🧋', '🍕', '🍫', '🍟', '🍰'];
        let items = [];

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Player
            ctx.font = '40px Arial';
            ctx.fillText('🧺', player.x, player.y);
            
            // Move/Draw Items
            items.forEach((item, index) => {
                item.y += 3;
                ctx.fillText(item.emoji, item.x, item.y);
                if (item.y > 400) items.splice(index, 1);
            });
            
            requestAnimationFrame(draw);
        }

        // Simple input
        window.addEventListener('mousemove', e => player.x = e.clientX - 20);
        setInterval(() => items.push({ x: Math.random() * 750, y: 0, emoji: treats[Math.floor(Math.random()*treats.length)] }), 1000);
        draw();
    </script>
</body>
</html>
