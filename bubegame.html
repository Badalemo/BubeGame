<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bube's Adventure</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; width: 100vw; height: 100vh; }
        #ui { position: absolute; bottom: 10%; left: 5%; right: 5%; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #fff; display: none; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui"><p id="text"></p></div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const text = document.getElementById('text');
        
        let player = { x: 100, y: 300, w: 50, h: 50 };
        let npc = { x: 600, y: 300, w: 50, h: 50, name: "Friend" };
        let keys = {};
        let talking = false;

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (!talking) {
                if (keys['ArrowLeft']) player.x -= 5;
                if (keys['ArrowRight']) player.x += 5;
                if (Math.abs(player.x - npc.x) < 60) {
                    ui.style.display = 'block';
                    text.innerText = "NPC: Hey Bube! Want some pizza? (Press SPACE)";
                    if (keys['Space']) talking = true;
                } else {
                    ui.style.display = 'none';
                }
            } else if (keys['Enter']) {
                talking = false;
                ui.style.display = 'none';
            }
        }

        function draw() {
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'pink';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = 'cyan';
            ctx.fillRect(npc.x, npc.y, npc.w, npc.h);
            ctx.fillStyle = 'white';
            ctx.fillText("Bube", player.x, player.y - 10);
            ctx.fillText(npc.name, npc.x, npc.y - 10);
            
            update();
            requestAnimationFrame(draw);
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    </script>
</body>
</html>
