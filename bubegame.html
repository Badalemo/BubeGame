<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bube's Epic Quest: Deluxe Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Press Start 2P', monospace;
            color: white; overflow: hidden; touch-action: none; user-select: none;
        }

        #gameContainer {
            position: relative; width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center; background: #111;
        }

        canvas {
            display: block; width: 100%; height: 100%; image-rendering: pixelated;
        }

        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 20, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; pointer-events: auto;
        }

        .title-logo {
            font-size: clamp(20px, 4vw, 40px); color: #ff69b4; text-shadow: 0 0 10px #ff69b4, 4px 4px 0 #000;
            margin-bottom: 20px; text-align: center; line-height: 1.5; animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #startScreen p {
            text-align: center; line-height: 1.8; font-size: clamp(8px, 1.5vw, 12px);
            margin-bottom: 30px; color: #b8c6db; max-width: 600px; padding: 0 20px;
        }

        button.ui-btn {
            background: linear-gradient(180deg, #ff85c6 0%, #ff69b4 100%);
            color: white; border: 4px solid #fff; padding: 15px 30px;
            font-family: 'Press Start 2P', monospace; cursor: pointer;
            box-shadow: 0 8px 0 #c2387d, 0 15px 20px rgba(0,0,0,0.5);
            font-size: clamp(10px, 2vw, 16px); transition: 0.1s; border-radius: 8px;
        }
        button.ui-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #c2387d, 0 0 0 rgba(0,0,0,0.5); }

        /* Modernized UI Elements */
        .hud-panel {
            background: rgba(20, 20, 30, 0.85); border: 2px solid #ff69b4;
            border-radius: 8px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); pointer-events: auto;
        }

        #inventory { position: absolute; top: 15px; left: 15px; font-size: 10px; max-width: 250px; line-height: 1.6; }
        #questLog { position: absolute; top: 15px; right: 15px; font-size: 8px; line-height: 1.6; width: 220px; }
        
        .quest-title { color: #ffeb3b; margin-bottom: 8px; border-bottom: 1px solid #555; padding-bottom: 4px;}
        .quest-item { color: #fff; margin-top: 8px; display: flex; align-items: flex-start; }
        .quest-item::before { content: '>'; color: #ff69b4; margin-right: 5px; }
        .quest-done { color: #666; text-decoration: line-through; }
        .quest-done::before { content: '✓'; color: #4CAF50; }

        #dialogueBox {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 800px; height: 140px; display: none; cursor: pointer;
            border: 4px solid #fff; border-radius: 12px; background: linear-gradient(180deg, rgba(30,30,45,0.95) 0%, rgba(10,10,20,0.95) 100%);
        }
